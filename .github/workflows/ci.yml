name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:

  # ── Check Frontend ──
  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: boxagnts-dashboard-web/package-lock.json

      - name: Install & Type-check
        working-directory: boxagnts-dashboard-web
        run: |
          npm ci
          npm run build

  # ── Check Rust ──
  check-rust:
    name: Check Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: cargo-check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-check-${{ runner.os }}-

      - name: Cargo check
        run: cargo check --package boxagnts-server

      - name: Cargo test
        run: cargo test --package boxagnts-server -- --nocapture
