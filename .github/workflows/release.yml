name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 20260517)'
        required: false

env:
  RUST_VERSION: stable
  NODE_VERSION: 24
  CARGO_TERM_COLOR: always

jobs:
  # Build frontend dashboard
  build-frontend:
    name: Build Frontend Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: boxagnts-dashboard-web/package-lock.json

      - name: Install dependencies
        working-directory: boxagnts-dashboard-web
        run: npm ci

      - name: Build frontend
        working-directory: boxagnts-dashboard-web
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: app/dashboard-web

  # Build Rust binaries
  build-rust:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
          # # Windows aarch64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: aarch64
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: aarch64
          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64
          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: app/dashboard-web

      - name: Install Rust (${{ env.RUST_VERSION }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}

      # Install cross-compilation dependencies for Linux aarch64
      - name: Install dependencies for Linux aarch64
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # Build Rust binary
      - name: Build Rust binary
        run: |
          cargo build --release --package boxagnts-server --bin Boxagnts --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare release package
        shell: bash
        run: |
          # Create package directory
          mkdir -p release-package

          # Copy app directory
          cp -r app/dashboard-web release-package/
          cp -r app/extensions release-package/
          cp -r app/AGENTS.md release-package/

          # Copy binary
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/Boxagnts.exe release-package/
          else
            cp target/${{ matrix.target }}/release/Boxagnts release-package/
            chmod +x release-package/Boxagnts
          fi

      - name: Package release
        shell: bash
        run: |
          ARCHIVE_NAME="Boxagnts-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ${ARCHIVE_NAME}.zip ./release-package/*
            echo "ASSET_NAME=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf ${ARCHIVE_NAME}.tar.gz -C release-package .
            echo "ASSET_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  # Create and publish release
  create-release:
    name: Create Release
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate tag from date
        id: generate-tag
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            TAG="${{ github.event.inputs.release_version }}"
          else
            TAG=$(date +'%Y%m%d')
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate-tag.outputs.tag }}
          name: Boxagnts ${{ steps.generate-tag.outputs.tag }}
          files: ./artifacts/*.{zip,tar.gz}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
